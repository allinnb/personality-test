<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>自我发现测试 | MBTI × SBTI × 动物人格 × 国际课程匹配</title>
<meta name="description" content="MBTI × SBTI 双轨人格探索，测出你的动物人格与国际课程匹配度，适合初高中学生">
<meta property="og:title" content="你是哪种动物人格？">
<meta property="og:description" content="MBTI × SBTI × 国际课程匹配，5分钟测出你的专属人格代码">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --secondary: #ec4899;
  --success: #10b981;
  --warning: #f59e0b;
  --bg: #0f172a;
  --bg2: #020617;
  --card: #1e293b;
  --card2: #334155;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
.container { max-width: 520px; margin: 0 auto; padding: 16px; min-height: 100vh; }
.hidden { display: none !important; }

/* 背景装饰 */
.bg-orbs {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.15;
}
.orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -100px; }
.orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -50px; left: -100px; }
.orb-3 { width: 200px; height: 200px; background: var(--success); top: 50%; left: 50%; transform: translate(-50%,-50%); }

/* 欢迎页 */
.welcome-screen {
  min-height: 100vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
  padding: 32px 24px; position: relative; z-index: 1;
}
.welcome-icon { font-size: 72px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.welcome-title { font-size: 30px; font-weight: 800; margin-bottom: 6px;
  background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.welcome-subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 6px; line-height: 1.7; }
.welcome-subtitle2 { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; line-height: 1.6; }
.welcome-animals { font-size: 38px; margin-bottom: 28px; letter-spacing: 6px; }
.welcome-cta {
  background: var(--gradient); color: white; border: none;
  padding: 18px 52px; border-radius: 50px; font-size: 17px;
  font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 32px rgba(99,102,241,0.4); letter-spacing: 1px;
}
.welcome-cta:hover { transform: translateY(-3px); box-shadow: 0 14px 44px rgba(99,102,241,0.5); }
.welcome-divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; width: 80%; }
.welcome-divider::before, .welcome-divider::after { content:''; flex:1; height:1px; background: rgba(255,255,255,0.1); }
.welcome-divider span { color: var(--text-muted); font-size: 12px; }
.welcome-animal-btn {
  background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15);
  color: var(--text); padding: 16px 36px; border-radius: 50px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; gap: 8px;
}
.welcome-animal-btn:hover { background: rgba(236,72,153,0.2); border-color: var(--secondary); transform: translateY(-2px); }
.welcome-info { margin-top: 28px; color: var(--text-muted); font-size: 13px; }

/* 进度条 */
.progress-bar { background: var(--card); height: 5px; border-radius: 3px; margin-bottom: 20px; }
.progress-fill { background: var(--gradient); height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.progress-text { color: var(--text-muted); font-size: 13px; margin-bottom: 6px; display: flex; justify-content: space-between; }

/* 题目卡片 */
.question-card { background: var(--card); border-radius: 24px; padding: 24px; animation: slideUp 0.3s ease; position: relative; z-index: 1; }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.module-badge { display: inline-block; background: rgba(99,102,241,0.2); color: var(--primary); padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; }
.module-badge.sbti { background: rgba(236,72,153,0.2); color: var(--secondary); }
.module-badge.style { background: rgba(16,185,129,0.2); color: var(--success); }
.module-badge.resilience { background: rgba(245,158,11,0.2); color: var(--warning); }
.question-number { color: var(--text-muted); font-size: 12px; margin-bottom: 6px; }
.question-text { font-size: 19px; font-weight: 700; margin-bottom: 18px; line-height: 1.5; }

/* 选项 */
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  background: rgba(255,255,255,0.04); border: 2px solid rgba(255,255,255,0.08);
  color: var(--text); padding: 15px 16px; border-radius: 14px; text-align: left;
  font-size: 14px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 12px; line-height: 1.4;
}
.option-btn:hover { background: rgba(99,102,241,0.15); border-color: var(--primary); transform: translateX(4px); }
.option-btn.selected { background: var(--primary); border-color: var(--primary); box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
.option-emoji { font-size: 22px; flex-shrink: 0; }
.option-letter { font-weight: 800; color: var(--primary); flex-shrink: 0; width: 22px; }
.option-btn.selected .option-letter { color: white; }

/* SBTI多选 */
.sbti-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 14px;
  background: rgba(255,255,255,0.04); padding: 10px 14px; border-radius: 10px;
  border-left: 3px solid var(--secondary); }
.sbti-hint span { color: var(--warning); font-weight: 700; }
.multi-select .option-btn.selected { background: rgba(236,72,153,0.25); border-color: var(--secondary); }
.multi-select .option-btn.selected::after {
  content: '✓'; position: absolute; top: 8px; right: 12px;
  background: var(--secondary); width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: white;
}
.option-btn { position: relative; }

/* 导航 */
.nav-buttons { display: flex; gap: 12px; margin-top: 20px; }
.nav-btn {
  flex: 1; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; border: none; letter-spacing: 0.5px;
}
.nav-btn.prev { background: rgba(255,255,255,0.08); color: var(--text-muted); }
.nav-btn.prev:hover { background: rgba(255,255,255,0.12); }
.nav-btn.next { background: var(--gradient); color: white; box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
.nav-btn.next:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; box-shadow: none; }
.nav-btn.next:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.4); }

/* 加载页 */
.loading { text-align: center; padding: 80px 0; }
.loading-animal { font-size: 72px; animation: bounce 1.2s infinite; }
@keyframes bounce { 0%,100%{transform:scale(1) translateY(0)} 50%{transform:scale(1.1) translateY(-15px)} }
.loading-text { color: var(--text-muted); margin-top: 20px; font-size: 15px; }
.loading-sub { color: var(--text-muted); font-size: 12px; margin-top: 8px; opacity: 0.7; }
.loading-bar { width: 60%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 20px auto 0; overflow: hidden; }
.loading-bar-fill { height: 100%; background: var(--gradient); border-radius: 2px; animation: loadFill 1.5s ease forwards; }
@keyframes loadFill { from{width:0} to{width:100%} }

/* 结果页 */
.result-screen { padding: 16px 0 40px; animation: slideUp 0.5s ease; }
.result-hero {
  text-align: center; padding: 32px 20px 28px;
  background: var(--card); border-radius: 28px; margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.result-hero::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: conic-gradient(from 0deg, rgba(99,102,241,0.1), rgba(236,72,153,0.1), rgba(99,102,241,0.1));
  animation: spin 8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.result-hero-content { position: relative; z-index: 1; }
.result-badge { display: inline-block; background: var(--gradient); padding: 6px 20px; border-radius: 30px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
.result-animal { font-size: 110px; margin-bottom: 12px; display: block; }
.result-title { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
.result-subtitle { color: var(--secondary); font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.result-mbti { display: inline-flex; gap: 4px; margin-top: 8px; }
.result-mbti-letter {
  width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; font-weight: 800;
}
.result-mbti-letter.E, .result-mbti-letter.S, .result-mbti-letter.T, .result-mbti-letter.J {
  background: rgba(99,102,241,0.25); color: #818cf8;
}
.result-mbti-letter.I, .result-mbti-letter.N, .result-mbti-letter.F, .result-mbti-letter.P {
  background: rgba(236,72,153,0.25); color: #f472b6;
}

.result-quote {
  background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(236,72,153,0.15));
  border-left: 4px solid var(--secondary);
  padding: 18px 20px; border-radius: 0 16px 16px 0;
  font-size: 14px; line-height: 1.8; margin: 16px 0;
  color: rgba(255,255,255,0.9);
}
.result-quote::before { content: '"'; font-size: 32px; color: var(--secondary); font-family: Georgia, serif; line-height: 0; vertical-align: -8px; margin-right: 4px; }

/* 结果卡片 */
.result-card { background: var(--card); border-radius: 20px; padding: 22px; margin-bottom: 14px; }
.result-card-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 700; }
.result-card-value { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.result-card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

/* SBTI图表 */
.sbti-chart { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.sbti-bar { display: flex; align-items: center; gap: 10px; }
.sbti-bar-label { font-size: 13px; width: 44px; flex-shrink: 0; font-weight: 600; }
.sbti-bar-track { flex: 1; height: 10px; background: rgba(255,255,255,0.07); border-radius: 5px; overflow: hidden; }
.sbti-bar-fill { height: 100%; border-radius: 5px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
.sbti-bar-value { font-size: 12px; width: 20px; text-align: right; color: var(--text-muted); }

/* 课程网格 */
.course-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.course-item { background: rgba(255,255,255,0.05); padding: 14px 10px; border-radius: 14px; text-align: center; transition: all 0.2s; }
.course-item:hover { background: rgba(99,102,241,0.15); }
.course-item-icon { font-size: 24px; margin-bottom: 6px; }
.course-item-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.course-item-sub { font-size: 11px; color: var(--text-muted); }
.course-item.main { border: 2px solid var(--primary); background: rgba(99,102,241,0.15); }
.course-item.main .course-item-name { color: var(--primary); }

/* 选课建议 */
.subject-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.subject-chip { background: rgba(255,255,255,0.07); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.subject-chip.hl { background: rgba(99,102,241,0.25); color: #818cf8; border: 1px solid rgba(99,102,241,0.4); }
.subject-chip.sl { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.4); }

/* 超能力/盲区 */
.power-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.power-item { background: rgba(255,255,255,0.04); padding: 14px; border-radius: 14px; }
.power-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.power-label.good { color: var(--success); }
.power-label.bad { color: var(--warning); }
.power-text { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

/* 分享按钮 */
.share-btn {
  width: 100%; padding: 16px; border-radius: 16px; border: none;
  background: linear-gradient(135deg, #25D366, #128C7E); color: white;
  font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(37,211,102,0.25);
}
.share-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,211,102,0.35); }
.retest-btn {
  width: 100%; padding: 14px; border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.15); background: transparent;
  color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
  margin-top: 10px; transition: all 0.2s;
}
.retest-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.25); }

/* 动物选择预览页 */
.animal-variant-hero {
  text-align: center; padding: 48px 20px 32px;
  background: var(--card); border-radius: 28px; margin-bottom: 16px;
}
.animal-variant-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.animal-variant-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
.animal-select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.animal-select-item {
  background: var(--card); border: 2px solid transparent; border-radius: 16px;
  padding: 16px 6px; text-align: center; cursor: pointer; transition: all 0.2s;
}
.animal-select-item:hover { border-color: var(--primary); transform: scale(1.08); box-shadow: 0 8px 24px rgba(99,102,241,0.2); }
.animal-select-item.selected { border-color: var(--secondary); background: rgba(236,72,153,0.15); box-shadow: 0 8px 24px rgba(236,72,153,0.2); }
.animal-select-icon { font-size: 40px; margin-bottom: 6px; display: block; }
.animal-select-name { font-size: 11px; color: var(--text-muted); font-weight: 600; }

/* 响应式 */
@media (max-width: 400px) {
  .course-grid { grid-template-columns: 1fr; }
  .power-grid { grid-template-columns: 1fr; }
  .result-mbti-letter { width: 36px; height: 36px; font-size: 16px; }
  .animal-select-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

<div class="bg-orbs">
  <div class="orb orb-1"></div>

</div>
<div class="container" id="app"></div>

<script>
// ==================== 完整题目数据 ====================
const QUESTIONS = [
  // --- 模块1：MBTI E/I (4题) ---

// ==================== 核心计算函数 ====================
function computeMBTI() {
  const e = state.mbti.E >= state.mbti.I ? 'E' : 'I';
  const s = state.mbti.S >= state.mbti.N ? 'S' : 'N';
  const t = state.mbti.T >= state.mbti.F ? 'T' : 'F';
  const j = state.mbti.J >= state.mbti.P ? 'J' : 'P';
  return e + s + t + j;
}

function computeSBTI() {
  return Object.entries(state.sbti)
    .sort((a,b) => b[1] - a[1])
    .filter(([,v]) => v > 0)
    .slice(0, 2)
    .map(([k,v]) => ({ type:k, score:v }));
}

function computeStyle() {
  const {V,A,K} = state.style;
  if (V >= A && V >= K) return 'V';
  if (A >= V && A >= K) return 'A';
  return 'K';
}

function computeResilience() {
  const r = state.resilience;
  if (r >= 14) return 'high';
  if (r >= 10) return 'mid';
  return 'grow';
}

function getAnimal(mbti) {
  return ANIMALS[mbti] || ANIMALS['ENFP'] || Object.values(ANIMALS)[0];
}

// ==================== SBTI多选计分 ====================
function recalcSBTI() {
  state.sbti = { R:0, S:0, B:0, T:0, A:0 };
  // 遍历所有SBTI多选题 (module===2)
  QUESTIONS.filter(q => q.module === 2).forEach((q, qi) => {
    const ans = state.answers[16 + qi]; // SBTI从第16题开始
    if (!ans || ans.length === 0) return;
    ans.forEach(i => {
      const v = q.options[i]?.value;
      if (v && state.sbti[v] !== undefined) state.sbti[v]++;
    });
  });
}

function renderTest(el) {
  const q    = QUESTIONS[state.currentQuestion];
  const total = QUESTIONS.length;
  const progress = (state.currentQuestion / total) * 100;
  const isMulti  = q.type === 'multi';
  const answered = state.answers[state.currentQuestion];
  const badgeClass = MODULE_BADGE[q.module];

  // 多选题：至少选1个才能下一步
  const canNext = isMulti
    ? (answered && answered.length > 0)
    : (answered !== undefined);

  el.innerHTML = `
    <div class="progress-text">
      <span>${MODULE_EMOJIS[q.module]} ${MODULE_NAMES[q.module]}</span>
      <span>${state.currentQuestion + 1}/${total}</span>

    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>

    <div class="question-card">
      <div class="module-badge ${badgeClass}">${MODULE_NAMES[q.module]}</div>
      <div class="question-number">第 ${state.currentQuestion + 1} 题</div>
      <div class="question-text">${q.question}</div>
      ${isMulti ? `<div class="sbti-hint">💡 <span>可选1-${isMulti===true?2:3}个</span>，选最符合的描述</div>` : ''}

      <div class="options ${isMulti ? 'multi-select' : ''}">
        ${q.options.map((opt, i) => {
          const isSelected = isMulti
            ? (answered && answered.includes(i))
            : (answered === i);
          return `
            <button class="option-btn ${isSelected ? 'selected' : ''}"
                    onclick="${isMulti ? `toggleMulti(${i})` : `selectOption(${i})`}">
              <span class="option-emoji">${opt.emoji}</span>
              <span class="option-letter">${opt.letter}.</span>
              <span>${opt.text}</span>
            </button>`;
        }).join('')}

    </div>

    <div class="nav-buttons">
      <button class="nav-btn prev" onclick="prevQuestion()" ${state.currentQuestion === 0 ? 'disabled' : ''}>← 上一题</button>
      <button class="nav-btn next" onclick="nextQuestion()" ${canNext ? '' : 'disabled'}>
        ${state.currentQuestion === total - 1 ? '🏆 查看结果' : '下一题 →'}
      </button>
    </div>
  `;
}

// ==================== 交互函数 ====================
window.startFullTest = function() {
  state = {
    screen: 'test',
    currentQuestion: 0,
    answers: {},
    mbti: { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 },
    sbti: { R:0, S:0, B:0, T:0, A:0 },
    style: { V:0, A:0, K:0 },
    resilience: 0
  };
  render();
};

window.showVariant = function() {
  state.screen = 'variant';
  window._variantAnswer = null;
  render();
};

window.selectOption = function(index) {
  state.answers[state.currentQuestion] = index;
  const q = QUESTIONS[state.currentQuestion];
  const opt = q.options[index];
  if (q.module === 1) {
    state.mbti[opt.value]++;
  } else if (q.module === 3) {
    state.style[opt.value]++;
  } else if (q.module === 4) {
    state.resilience += Number(opt.value);
  }
  render();
};

window.toggleMulti = function(index) {
  const MAX = 2;
  if (!state.answers[state.currentQuestion]) {
    state.answers[state.currentQuestion] = [];
  }
  const arr = state.answers[state.currentQuestion];
  const pos = arr.indexOf(index);
  if (pos > -1) {
    arr.splice(pos, 1);
  } else if (arr.length < MAX) {
    arr.push(index);
  }
  recalcSBTI();
  render();
};

window.nextQuestion = function() {
  if (state.currentQuestion < QUESTIONS.length - 1) {
    state.currentQuestion++;
    render();
  } else {
    state.screen = 'loading';
    render();
    setTimeout(() => {
      state.screen = 'result';
      render();
    }, 1800);
  }
};

window.prevQuestion = function() {
  if (state.currentQuestion > 0) {
    state.currentQuestion--;
    render();
  }
};

window.resetTest = function() {
  state.screen = 'welcome';
  render();
};

window.shareResult = function() {
  const mbti    = computeMBTI();
  const animal  = getAnimal(mbti);
  const style   = computeStyle();
  const mainSBTI = computeSBTI()[0]?.type || 'R';
  const courseData = COURSE_MAP[mainSBTI] || COURSE_MAP['R'];

  const text = `🐾 我的动物人格是【${animal.emoji}${animal.name}】！

${ANIMAL_QUOTES[animal.emoji]}

🧠 MBTI: ${mbti}
🎯 兴趣类型: ${courseData.name}
📚 推荐课程: ${courseData.main?.name || 'IB DP'}
${STYLE_ICONS[style]} 学习风格: ${STYLE_NAMES[style]}

🔗 来测测你的动物人格吧！
#自我发现测试 #MBTI #国际课程 #${animal.name}`;

  if (navigator.share) {
    navigator.share({ title: `我的动物人格：${animal.name}`, text });
  } else {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.share-btn');
      if (btn) {
        btn.textContent = '✅ 结果已复制！快去分享吧';
        setTimeout(() => btn.textContent = '📤 分享我的动物人格', 3000);
      }
    });
  }
};
